<section>
    <div class="register-card">
        <div class="card-header">
            <h1>Novo Bairro</h1>
            <p>Preencha os dados para cadastrar um novo bairro</p>
        </div>

        @if (errorMessage) {
        <div class="alert alert-error">{{ errorMessage }}</div>
        }

        @if (successMessage) {
        <div class="alert alert-success">{{ successMessage }}</div>
        }


        <div class="form">
            <div class="field">
                <label for="name">Nome do Bairro</label>
                <input id="name" type="text" placeholder="Ex: Parque X" [(ngModel)]="form.name" />
            </div>

            <div class="actions">
                <button class="btn-secondary" type="button" (click)="goBack()">Cancelar</button>
                <button class="btn-primary" type="button" (click)="register()" [disabled]="loading">
                    {{ loading ? 'Cadastrando...' : 'Cadastrar' }}
                </button>
