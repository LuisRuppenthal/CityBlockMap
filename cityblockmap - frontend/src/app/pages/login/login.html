<div class="login-page">
    <!--<div class="login-wrapper">-->
    <section class="login-card">
        <div class="brand">
            <!--<div class="brand-logo">
        </div>-->
            <h1>Login</h1>
        </div>

        <h2>Faça login em sua conta</h2>

        <form class="login-form" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="login">Login</label>
                <div class="input-wrapper">
                    <input id="login" type="text" name="login" [(ngModel)]="login" placeholder="Digite seu login"
                        required />
                    <!--<span class="input-icon"></span>-->
                </div>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <div class="input-wrapper">
                    <input id="password" type="password" name="password" [(ngModel)]="password"
                        placeholder="Digite sua senha" required />
                    <!--<span class="input-icon"></span>-->
                </div>
            </div>

            <div class="forgot-password">
                <a href="#">Esqueceu a senha?</a>
            </div>

            @if (errorMessage) {
            <p>{{ errorMessage }}</p>
            }

            <button type="submit" class="btn btn-primary" [disabled]="loading">
                {{ loading ? 'Entrando...' : 'Login' }}
            </button>

            <div class="divider">
                <span>or</span>
            </div>

            <button type="button" class="btn btn-secondary">Inscreva-se</button>
        </form>
    </section>

    <!--<section class="illustration-panel">
            <div class="illustration-box">
                <h3>H3!</h3>

                <div class="shape">
                    <img src="" alt="Ilustração login" />
                </div>
            </div>
        </section>-->
    <!--</div>-->
</div>
