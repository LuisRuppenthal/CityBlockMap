<div class="modal-card">
  <img src="trash-can-regular.png" alt="deletar"/>

  <h2>Deletar Bairro</h2>
  <p>Tem certeza que deseja deletar este bairro? Esta ação não pode ser desfeita.</p>

  <div class="actions">
    <button class="btn-cancel" type="button" (click)="closeDeleteModal()">Cancelar</button>
    <button class="btn-delete" type="button" (click)="deleteModal()">Deletar</button>
  </div>
</div>
